name: Build Android APK

on:
  push:
    branches:
      - main
    tags:
      - 'v*.*.*'
  pull_request:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build Debug APK
        run: ./gradlew assembleDebug
        env:
          CI: true

      - name: Upload Debug APK as artifact
        uses: actions/upload-artifact@v4
        with:
          name: World-Times-debug
          path: app/build/outputs/apk/debug/app-debug.apk
          if-no-files-found: warn

      - name: Build Release APK (unsigned)
        if: startsWith(github.ref, 'refs/tags/v')
        run: ./gradlew assembleRelease
        env:
          CI: true

      - name: Sign & Align Release APK
        if: startsWith(github.ref, 'refs/tags/v')
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: |
          # Find Android SDK build-tools for zipalign
          BUILD_TOOLS="${ANDROID_SDK_ROOT}/build-tools"
          ZIPALIGN=$(find "$BUILD_TOOLS" -name zipalign 2>/dev/null | head -1)
          if [ -z "$ZIPALIGN" ]; then
            ZIPALIGN=$(find /usr/local -name zipalign 2>/dev/null | head -1)
          fi
          if [ -z "$ZIPALIGN" ]; then
            echo "zipalign not found, installing..."
            # Install latest build-tools via sdkmanager
            yes | ${ANDROID_SDK_ROOT}/cmdline-tools/latest/bin/sdkmanager "build-tools;34.0.0" 2>/dev/null || true
            ZIPALIGN=$(find "$BUILD_TOOLS" -name zipalign 2>/dev/null | head -1)
          fi
          echo "Using zipalign: $ZIPALIGN"
          
          # Decode keystore
          echo "$KEYSTORE_BASE64" | base64 -d > release-keystore.jks
          
          UNSIGNED="app/build/outputs/apk/release/app-release-unsigned.apk"
          SIGNED="app/build/outputs/apk/release/app-release-signed.apk"
          ALIGNED="app/build/outputs/apk/release/World-Times-${{ github.ref_name }}.apk"
          
          # Sign
          jarsigner -verbose -sigalg SHA256withRSA -digestalg SHA-256 \
            -keystore release-keystore.jks \
            -storepass "$KEYSTORE_PASSWORD" \
            -keypass "$KEY_PASSWORD" \
            "$UNSIGNED" \
            "$KEY_ALIAS"
          
          # Verify signature
          jarsigner -verify "$UNSIGNED"
          
          # Align
          if [ -n "$ZIPALIGN" ]; then
            "$ZIPALIGN" -v -p 4 "$UNSIGNED" "$ALIGNED"
          else
            cp "$UNSIGNED" "$ALIGNED"
          fi
          ls -la "$ALIGNED"

      - name: Create Release
        if: startsWith(github.ref, 'refs/tags/v')
        env:
          RELEASE_TOKEN: ${{ secrets.RELEASE_TOKEN }}
        run: |
          TAG="${{ github.ref_name }}"
          
          # Create release via API
          curl -sL -X POST \
            -H "Authorization: token $RELEASE_TOKEN" \
            -H "Accept: application/vnd.github.v3+json" \
            "https://api.github.com/repos/${{ github.repository }}/releases" \
            -d "{\"tag_name\": \"$TAG\", \"name\": \"World Times $TAG\"}" > /tmp/release.json
          
          # Get upload URL
          UPLOAD_URL=$(python3 -c "import json; d=json.load(open('/tmp/release.json')); print(d['upload_url'].replace('{?name,label}',''))")
          
          # Upload debug APK
          curl -sL -X POST \
            -H "Authorization: token $RELEASE_TOKEN" \
            -H "Content-Type: application/vnd.android.package-archive" \
            "$UPLOAD_URL?name=World-Times-debug.apk" \
            --data-binary "@app/build/outputs/apk/debug/app-debug.apk" > /dev/null
          
          # Upload release APK
          curl -sL -X POST \
            -H "Authorization: token $RELEASE_TOKEN" \
            -H "Content-Type: application/vnd.android.package-archive" \
            "$UPLOAD_URL?name=World-Times-$TAG.apk" \
            --data-binary "@app/build/outputs/apk/release/World-Times-$TAG.apk" > /dev/null
          
          echo "Release created: https://github.com/${{ github.repository }}/releases/tag/$TAG"
